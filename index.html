<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Smart 2 골든벨</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --chalk-white:#F5F0E8;
  --chalk-dim:#C8C0A8;
  --chalk-hint:#9A9080;
  --board:#1A3A2A;
  --board2:#1E4430;
  --board3:#163020;
  --gold:#FFD700;
  --gold2:#FFC200;
  --gold3:#E8A800;
  --gold-pale:#FFF8D6;
  --green-bright:#4ADE80;
  --red-bright:#F87171;
  --blue-bright:#60A5FA;
  --purple-bright:#C084FC;
  --font:'Noto Sans KR',sans-serif;
}

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

html,body{width:100%;height:100%;overflow:hidden;background:#111;}

body{
  font-family:var(--font);
  background:var(--board);
  color:var(--chalk-white);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  position:relative;
}

/* ── 칠판 질감 ── */
body::before{
  content:'';position:fixed;inset:0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px),
    repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(0,0,0,.03) 3px,rgba(0,0,0,.03) 4px);
  pointer-events:none;z-index:0;
}
/* 칠판 테두리 */
body::after{
  content:'';position:fixed;inset:0;
  border:18px solid #5C3A1A;
  outline:6px solid #7A4E22;
  box-shadow:inset 0 0 40px rgba(0,0,0,.5),0 0 0 4px #3A2008;
  pointer-events:none;z-index:200;
  border-radius:4px;
}

/* ── 분필 먼지 파티클 ── */
.chalk-dust{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:1;overflow:hidden;
}
.dust{
  position:absolute;border-radius:50%;
  background:rgba(245,240,232,.15);
  animation:dustFloat var(--dd,8s) ease-in-out infinite var(--ddl,0s);
}
@keyframes dustFloat{
  0%{transform:translateY(0) translateX(0);opacity:0;}
  20%{opacity:1;}
  80%{opacity:.3;}
  100%{transform:translateY(-80px) translateX(var(--dx,20px));opacity:0;}
}

/* ── 공통 화면 ── */
.screen{display:none;position:relative;z-index:10;width:100%;max-width:1100px;padding:0 2rem;}
.screen.active{display:flex;flex-direction:column;align-items:center;}
@keyframes chalkIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
.screen.active{animation:chalkIn .4s ease;}

/* ══════════════════════════════════
   TITLE SCREEN
══════════════════════════════════ */
#s-title{gap:1.2rem;text-align:center;justify-content:center;min-height:100vh;}

/* 금색 종 SVG 래퍼 */
.bell-wrap{
  position:relative;
  width:160px;height:160px;
  margin:0 auto;
  animation:bellSway 3s ease-in-out infinite;
  filter:drop-shadow(0 4px 20px rgba(255,215,0,.5));
}
@keyframes bellSway{
  0%,100%{transform:rotate(-8deg);}
  50%{transform:rotate(8deg);}
}

.title-chalk{
  font-size:clamp(2.4rem,5vw,4rem);
  font-weight:900;
  color:var(--chalk-white);
  line-height:1.1;
  letter-spacing:-.02em;
  text-shadow:2px 2px 0 rgba(0,0,0,.3),0 0 30px rgba(245,240,232,.1);
}
.title-gold{color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,.4),2px 2px 0 rgba(0,0,0,.3);}

.title-sub{font-size:1.1rem;color:var(--chalk-dim);font-weight:400;letter-spacing:.05em;}

/* 분필 밑줄 */
.chalk-line{
  width:60%;height:3px;background:none;margin:0 auto;
  border-bottom:3px solid var(--chalk-dim);
  opacity:.5;border-radius:2px;
}

.chapter-pills{
  display:flex;flex-wrap:wrap;gap:10px;justify-content:center;
  max-width:700px;
}
.ch-pill{
  background:rgba(245,240,232,.08);
  border:1.5px solid rgba(245,240,232,.2);
  border-radius:50px;
  padding:.5rem 1.2rem;
  font-size:.9rem;font-weight:500;
  color:var(--chalk-dim);
  letter-spacing:.03em;
}
.ch-pill .num{color:var(--gold);font-weight:700;margin-right:4px;}

.start-btn{
  padding:1.1rem 3.5rem;
  background:var(--gold);
  color:#1A0A00;
  border:none;border-radius:50px;
  font-size:1.25rem;font-weight:900;
  cursor:pointer;font-family:var(--font);
  transition:all .15s;
  box-shadow:0 4px 20px rgba(255,215,0,.35),inset 0 1px 0 rgba(255,255,255,.3);
  letter-spacing:.02em;
}
.start-btn:hover{background:var(--gold2);transform:translateY(-3px);box-shadow:0 8px 28px rgba(255,215,0,.45);}

/* ══════════════════════════════════
   QUIZ SCREEN
══════════════════════════════════ */
#s-quiz{gap:1rem;min-height:100vh;justify-content:center;}

/* 상단 바 */
.topbar{
  display:flex;align-items:center;gap:14px;width:100%;
  padding:.5rem 0;
}
.tb-badge{
  background:rgba(255,215,0,.15);
  border:1.5px solid rgba(255,215,0,.4);
  border-radius:50px;padding:.35rem 1rem;
  font-size:.85rem;font-weight:700;color:var(--gold);
  white-space:nowrap;
}
.tb-badge.killer{
  background:rgba(192,132,252,.15);
  border-color:rgba(192,132,252,.5);
  color:var(--purple-bright);
}
.progress-rail{flex:1;height:8px;background:rgba(245,240,232,.1);border-radius:50px;overflow:hidden;}
.progress-fill{height:100%;background:var(--gold);border-radius:50px;transition:width .6s ease;}
.tb-count{font-size:.9rem;color:var(--chalk-dim);white-space:nowrap;font-weight:500;}

/* 문제 카드 */
.q-card{
  width:100%;
  background:rgba(245,240,232,.04);
  border:1.5px solid rgba(245,240,232,.12);
  border-radius:20px;
  padding:2rem 2.4rem 1.8rem;
  position:relative;
}
/* 왼쪽 타입 색선 */
.q-card::before{
  content:'';position:absolute;left:0;top:20px;bottom:20px;
  width:4px;border-radius:2px;
  background:var(--gold);
  transition:background .3s;
}
.q-card.killer::before{background:var(--purple-bright);}
.q-card.short-type::before{background:var(--blue-bright);}

/* 문제 번호 + 타입 */
.q-meta{display:flex;align-items:center;gap:10px;margin-bottom:.8rem;}
.q-num{
  width:38px;height:38px;border-radius:50%;
  background:var(--gold);color:#1A0A00;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:900;flex-shrink:0;
}
.q-num.killer{background:var(--purple-bright);}
.q-type-tag{
  padding:.2rem .7rem;border-radius:50px;font-size:.78rem;font-weight:700;
}
.tag-mcq{background:rgba(255,215,0,.12);color:var(--gold);border:1px solid rgba(255,215,0,.3);}
.tag-short{background:rgba(96,165,250,.12);color:var(--blue-bright);border:1px solid rgba(96,165,250,.3);}
.tag-killer{background:rgba(192,132,252,.12);color:var(--purple-bright);border:1px solid rgba(192,132,252,.3);}

/* 문제 텍스트 */
.q-text{
  font-size:clamp(1.15rem,2.2vw,1.45rem);
  font-weight:700;line-height:1.55;
  color:var(--chalk-white);
  margin-bottom:1rem;
}
/* 문제 안 보조 문장 (이탤릭 분필색) */
.q-sub{
  display:block;
  margin-top:.5rem;
  font-size:1.1rem;font-weight:400;
  color:var(--chalk-dim);font-style:italic;
}
/* 어법 오류 문장 박스 */
.err-sent{
  background:rgba(245,240,232,.06);
  border-left:3px solid rgba(192,132,252,.5);
  border-radius:0 12px 12px 0;
  padding:1rem 1.2rem;
  font-size:1.1rem;line-height:1.9;
  margin-bottom:1rem;color:var(--chalk-white);
}
.ul-word{
  color:#FDE68A;font-weight:700;
  text-decoration:underline;text-underline-offset:4px;
  text-decoration-color:rgba(253,230,138,.5);
}

/* 선택지 */
.choices{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
  margin-top:.8rem;
}
.choice{
  background:rgba(245,240,232,.06);
  border:1.5px solid rgba(245,240,232,.15);
  border-radius:14px;
  padding:.9rem 1.1rem;
  font-size:1rem;font-weight:500;
  color:var(--chalk-white);
  display:flex;align-items:flex-start;gap:10px;
  line-height:1.45;
  transition:all .2s;
}
.choice-num{
  font-size:1.1rem;font-weight:700;
  color:rgba(245,240,232,.4);flex-shrink:0;
  transition:color .2s;
}
/* 정답 공개 후 */
.choice.revealed-correct{
  background:rgba(74,222,128,.15);
  border-color:var(--green-bright);
}
.choice.revealed-correct .choice-num{color:var(--green-bright);}
.choice.revealed-wrong{
  background:rgba(248,113,113,.08);
  border-color:rgba(248,113,113,.3);
  opacity:.55;
}

/* 주관식 답 칸 (비어있는 분필줄 느낌) */
.short-blank{
  margin-top:.8rem;
  border-bottom:2.5px dashed rgba(245,240,232,.25);
  padding:.7rem 0;
  font-size:1.1rem;color:rgba(245,240,232,.25);
  font-style:italic;letter-spacing:.05em;
}

/* 정답 공개 박스 */
.reveal-box{
  display:none;
  margin-top:1rem;
  background:rgba(74,222,128,.1);
  border:1.5px solid rgba(74,222,128,.35);
  border-radius:14px;
  padding:1rem 1.3rem;
  animation:chalkIn .35s ease;
}
.reveal-box.show{display:block;}
.reveal-ans{
  font-size:1.3rem;font-weight:900;
  color:var(--green-bright);
  margin-bottom:.35rem;
}
.reveal-ans .ans-label{font-size:.85rem;font-weight:500;color:rgba(74,222,128,.7);margin-right:8px;}
.reveal-exp{font-size:.9rem;color:var(--chalk-dim);line-height:1.55;}

/* 하단 버튼 행 */
.btn-row{
  display:flex;gap:12px;width:100%;justify-content:flex-end;
  margin-top:.4rem;
}
.btn-reveal{
  padding:.8rem 2rem;
  background:var(--gold);color:#1A0A00;
  border:none;border-radius:50px;
  font-size:1rem;font-weight:900;
  cursor:pointer;font-family:var(--font);
  transition:all .15s;
  box-shadow:0 2px 12px rgba(255,215,0,.3);
}
.btn-reveal:hover{background:var(--gold2);transform:translateY(-2px);}
.btn-reveal:disabled{background:rgba(245,240,232,.1);color:rgba(245,240,232,.3);cursor:default;transform:none;box-shadow:none;}
.btn-next{
  padding:.8rem 2rem;
  background:rgba(245,240,232,.08);
  border:1.5px solid rgba(245,240,232,.2);
  border-radius:50px;
  font-size:1rem;font-weight:700;color:var(--chalk-white);
  cursor:pointer;font-family:var(--font);
  transition:all .15s;
  display:none;
}
.btn-next.show{display:block;}
.btn-next:hover{background:rgba(245,240,232,.15);border-color:rgba(245,240,232,.35);}

/* ══════════════════════════════════
   RESULT SCREEN
══════════════════════════════════ */
#s-result{gap:1.4rem;text-align:center;min-height:100vh;justify-content:center;}

.res-bell{
  font-size:72px;line-height:1;
  animation:bellSway 2s ease-in-out infinite;
  filter:drop-shadow(0 4px 20px rgba(255,215,0,.5));
}
.res-title{font-size:2rem;font-weight:900;color:var(--gold);}
.res-score{font-size:4rem;font-weight:900;color:var(--chalk-white);}
.res-score span{font-size:1.4rem;font-weight:400;color:var(--chalk-dim);}
.res-grade{font-size:1.2rem;font-weight:500;color:var(--chalk-dim);}
.res-dots{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:600px;}
.res-dot{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.78rem;font-weight:700;
}
.res-dot.ok{background:rgba(74,222,128,.2);color:var(--green-bright);border:1.5px solid var(--green-bright);}
.res-dot.ng{background:rgba(248,113,113,.15);color:var(--red-bright);border:1.5px solid rgba(248,113,113,.4);}
.res-dot.ref{background:rgba(96,165,250,.15);color:var(--blue-bright);border:1.5px solid rgba(96,165,250,.4);}

.res-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.res-btn{
  padding:.85rem 2rem;border-radius:50px;
  font-size:1rem;font-weight:700;cursor:pointer;border:none;
  font-family:var(--font);transition:all .15s;
}
.res-btn.primary{background:var(--gold);color:#1A0A00;}
.res-btn.secondary{background:rgba(245,240,232,.08);color:var(--chalk-white);border:1.5px solid rgba(245,240,232,.2);}
.res-btn:hover{transform:translateY(-2px);filter:brightness(1.1);}

/* confetti */
.cp{
  position:fixed;pointer-events:none;z-index:999;
  border-radius:2px;
  animation:cpFall var(--cd,2.5s) ease-in var(--cl,0s) forwards;
}
@keyframes cpFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(110vh) rotate(780deg);opacity:0;}
}

/* 분필 글씨 효과 */
@keyframes chalkWrite{
  from{clip-path:inset(0 100% 0 0);}
  to{clip-path:inset(0 0% 0 0);}
}

/* 반응형 */
@media(max-width:640px){
  .choices{grid-template-columns:1fr;}
  body::after{border-width:10px;}
  .q-card{padding:1.4rem 1.2rem 1.2rem;}
}
</style>
</head>
<body>

<!-- 분필 먼지 -->
<div class="chalk-dust" id="chalk-dust"></div>

<!-- ▶ 타이틀 -->
<div id="s-title" class="screen active">

  <!-- 금색 종 SVG 일러스트 -->
  <div class="bell-wrap">
    <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg" width="160" height="160">

      </g>

  </div>

  <div class="title-chalk"><span class="title-gold">골든벨</span> 리뷰</div>
  <div class="title-sub">Grammar Smart 2 · Ch.01~05</div>
  <div class="chalk-line"></div>

  <div class="chapter-pills">
    <div class="ch-pill"><span class="num">01</span>문장의 형식</div>
    <div class="ch-pill"><span class="num">02</span>조동사</div>
    <div class="ch-pill"><span class="num">03</span>비교</div>
    <div class="ch-pill"><span class="num">04</span>수동태</div>
    <div class="ch-pill"><span class="num">05</span>명사·관사</div>
    <div class="ch-pill" style="color:var(--purple-bright);border-color:rgba(192,132,252,.3)">
      <span style="color:var(--purple-bright);font-weight:700;margin-right:4px">🔥</span>킬러 문항 포함
    </div>
  </div>

  <button class="start-btn" onclick="startGame()">🔔 골든벨 시작</button>

</div>

<!-- ▶ 문제 -->
<div id="s-quiz" class="screen">
  <div class="topbar">
    <div class="tb-badge" id="tb-chapter">Ch.01</div>
    <div class="progress-rail"><div class="progress-fill" id="pb" style="width:0%"></div></div>
    <div class="tb-count" id="tb-count">1 / 50</div>
  </div>
  <div class="q-card" id="q-card"></div>
  <div class="btn-row">
    <button class="btn-reveal" id="btn-reveal" onclick="revealAnswer()">🔔 정답 공개</button>
    <button class="btn-next show" id="btn-next" onclick="nextQ()" style="display:none">다음 문제 →</button>
  </div>
</div>

<!-- ▶ 결과 -->
<div id="s-result" class="screen">
  <div class="res-bell">🔔</div>
  <div class="res-title" id="res-title">결과</div>
  <div class="res-score" id="res-score">0<span> / 50</span></div>
  <div class="res-grade" id="res-grade"></div>
  <div class="res-dots" id="res-dots"></div>
  <div class="res-btns">
    <button class="res-btn primary" onclick="startGame()">🔄 다시 시작</button>
    <button class="res-btn secondary" onclick="showScreen('s-title')">처음으로</button>
  </div>
</div>

<script>
// ────────────────────────────────────────────────────────
// 분필 먼지 파티클
// ────────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('chalk-dust');
  for(let i=0;i<30;i++){
    const d=document.createElement('div');
    d.className='dust';
    const s=Math.random()*4+2;
    d.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;top:${60+Math.random()*40}%;--dd:${6+Math.random()*8}s;--ddl:${Math.random()*8}s;--dx:${(Math.random()-.5)*40}px;`;
    c.appendChild(d);
  }
})();

// ────────────────────────────────────────────────────────
// 문제 데이터
// ────────────────────────────────────────────────────────
// 기본판 위주 + 킬러 문항 (문장형식/비교/명사관사)
const QUESTIONS = [

// ── Ch.01 문장의 형식 (기본 8 + 킬러 2) ──────────────────
{ch:1,topic:"문장의 형식",killer:false,t:"mcq",
 q:"다음 중 문장의 형식이 나머지와 다른 것은?",
 ch_opts:["① She became a doctor.","② He looks tired.","③ The sun rises in the east.","④ It smells delicious."],
 a:2, ae:"③은 1형식(S+V). 나머지 ①②④는 모두 2형식(S+V+주격보어)."},

{ch:1,topic:"문장의 형식",killer:false,t:"mcq",
 q:"빈칸에 알맞은 것은?\nShe _____ a nurse at the local hospital.",
 ch_opts:["① is","② looks","③ goes","④ arrives"],
 a:0, ae:"be동사 2형식: S+V+주격보어(명사). 주격보어 자리에 명사가 왔으므로 ①."},

// ────────────────────────────────────────────────────────
// 게임 상태
// ────────────────────────────────────────────────────────
let idx=0;
let results=[];
let revealed=false;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame(){
  idx=0; results=[];
  showScreen('s-quiz');
  render();
}

// ────────────────────────────────────────────────────────
// 문제 렌더
// ────────────────────────────────────────────────────────
function render(){
  revealed=false;
  const q=QUESTIONS[idx];
  const total=QUESTIONS.length;

  // 진행 상태
  document.getElementById('tb-chapter').textContent=`Ch.0${q.ch} ${q.topic}`;
  document.getElementById('tb-chapter').className='tb-badge'+(q.killer?' killer':'');
  document.getElementById('pb').style.width=Math.round(idx/total*100)+'%';
  document.getElementById('tb-count').textContent=`${idx+1} / ${total}`;

  // 버튼 리셋
  const btnR=document.getElementById('btn-reveal');
  const btnN=document.getElementById('btn-next');
  btnR.disabled=false; btnR.style.display='';
  btnN.style.display='none';

  // 카드 렌더
  const card=document.getElementById('q-card');
  card.className='q-card'+(q.killer?' killer':'')+(q.t==='short'?' short-type':'');

  const lines=q.q.split('\n');
  const mainQ=lines[0];
  const subQ=lines.slice(1).join('\n');

  const typeTag=q.killer
    ?'<span class="q-type-tag tag-killer">🔥 킬러</span>'
    :(q.t==='short'?'<span class="q-type-tag tag-short">주관식</span>':'<span class="q-type-tag tag-mcq">객관식</span>');

  const numStyle=q.killer?'class="q-num killer"':'class="q-num"';

  let html=`
    <div class="q-meta">
      <div ${numStyle}>${idx+1}</div>
      ${typeTag}
    </div>
    <div class="q-text">${esc(mainQ)}${subQ?`<span class="q-sub">${esc(subQ)}</span>`:''}
    </div>`;

  // 선택지 (객관식)
  if(q.t==='mcq'){
    // 어법오류 문장형 처리 (밑줄 표시)
    const hasUl=q.ch_opts&&q.ch_opts[0]&&!q.ch_opts[0].startsWith('①');
    html+='<div class="choices">';
    (q.ch_opts||[]).forEach((c,i)=>{
      const hasNum=/^[①②③④]/.test(c);
      const label=hasNum?'':['①','②','③','④'][i]+'  ';
      html+=`<div class="choice" id="c${i}"><span class="choice-num">${['①','②','③','④'][i]}</span><span>${esc(hasNum?c.replace(/^[①②③④]\s*/,''):c)}</span></div>`;
    });
    html+='</div>';
  } else {
    html+=`<div class="short-blank">→ &nbsp;&nbsp;정답: ___________________________</div>`;
  }

  // 정답 공개 박스 (숨김)
  html+=`<div class="reveal-box" id="reveal-box">
    <div class="reveal-ans"><span class="ans-label">정답</span>${
      q.t==='mcq'
        ?`${['①','②','③','④'][q.a]}  ${esc((q.ch_opts[q.a]||'').replace(/^[①②③④]\s*/,''))}`
        :esc(q.a)
    }</div>
    <div class="reveal-exp">${esc(q.ae)}</div>
  </div>`;

  card.innerHTML=html;
}

function revealAnswer(){
  if(revealed) return;
  revealed=true;
  const q=QUESTIONS[idx];

  // 선택지 색 표시 (객관식)
  if(q.t==='mcq'){
    (q.ch_opts||[]).forEach((_,i)=>{
      const el=document.getElementById('c'+i);
      if(!el) return;
      if(i===q.a) el.classList.add('revealed-correct');
      else el.classList.add('revealed-wrong');
    });
  }

  // 정답 박스 표시
  document.getElementById('reveal-box').classList.add('show');

  // 버튼 전환
  document.getElementById('btn-reveal').disabled=true;
  const btnN=document.getElementById('btn-next');
  btnN.style.display='block';

  // 결과 기록 (선생님 진행용이므로 모두 '확인완료'로 처리)
  results.push('ref');
}

function nextQ(){
  idx++;
  if(idx>=QUESTIONS.length){ showResult(); return; }
  render();
}

// ────────────────────────────────────────────────────────
// 결과
// ────────────────────────────────────────────────────────
function showResult(){
  const total=QUESTIONS.length;
  document.getElementById('res-title').textContent='전체 완료!';
  document.getElementById('res-score').innerHTML=`${total}<span> 문제</span>`;
  document.getElementById('res-grade').textContent='수고하셨습니다! 📣 모든 문제를 완료했어요.';

  let dots='';
  QUESTIONS.forEach((q,i)=>{
    const label=q.killer?'🔥':`${i+1}`;
    dots+=`<div class="res-dot ref" title="Ch.0${q.ch}">${q.killer?'🔥':i+1}</div>`;
  });
  document.getElementById('res-dots').innerHTML=dots;
  showScreen('s-result');
  launchConfetti();
}

function launchConfetti(){
  const colors=['#FFD700','#FFC200','#FFFFFF','#A78BFA','#4ADE80','#60A5FA'];
  for(let i=0;i<80;i++){
    const el=document.createElement('div');
    el.className='cp';
    const w=5+Math.random()*8, h=5+Math.random()*8;
    el.style.cssText=`left:${Math.random()*100}vw;top:-20px;width:${w}px;height:${h}px;background:${colors[~~(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};--cd:${2+Math.random()*2.5}s;--cl:${Math.random()*.8}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(3+Math.random())*1000);
  }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/<u>/g,'__U_OPEN__').replace(/<\/u>/g,'__U_CLOSE__').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/__U_OPEN__/g,'<u>').replace(/__U_CLOSE__/g,'</u>').replace(/\n/g,'<br>'); }
</script>
