<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Smart 2 골든벨</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow: #FFD600;
    --yellow-dark: #E6BF00;
    --yellow-pale: #FFF9CC;
    --orange: #FF7A00;
    --pink: #FF5FA0;
    --purple: #7C3AED;
    --purple-light: #A78BFA;
    --teal: #0EA5E9;
    --green: #22C55E;
    --green-dark: #16A34A;
    --red: #EF4444;
    --bg: #1A0A3B;
    --bg2: #2D1460;
    --card: #3B1C7A;
    --card2: #4C2690;
    --white: #FFFFFF;
    --gray: #C4B8E8;
    --font: 'Noto Sans KR', sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
    overflow: hidden;
    position: relative;
    user-select: none;
  }

  /* 배경 별/반짝임 */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star {
    position: absolute; border-radius: 50%;
    background: var(--yellow);
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }

  /* 떠다니는 장식 */
  .floater {
    position: fixed; font-size: var(--fs, 28px); pointer-events: none; z-index: 0;
    animation: float var(--fd, 6s) ease-in-out infinite var(--fdelay, 0s);
    opacity: 0.18;
  }
  @keyframes float {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(8deg); }
  }

  /* 메인 컨테이너 */
  #app {
    position: relative; z-index: 10;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1.5rem;
  }

  /* 화면 전환 */
  .screen { display: none; width: 100%; max-width: 900px; animation: fadeIn .35s ease; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* ══════════ 타이틀 화면 ══════════ */
  #screen-title { gap: 1.2rem; text-align: center; }

  .bell-icon {
    font-size: 80px; line-height: 1;
    animation: bellRing 2s ease-in-out infinite;
    filter: drop-shadow(0 0 20px #FFD600);
  }
  @keyframes bellRing {
    0%,100% { transform: rotate(0deg); }
    10% { transform: rotate(-18deg); }
    20% { transform: rotate(18deg); }
    30% { transform: rotate(-12deg); }
    40% { transform: rotate(12deg); }
    50%,100% { transform: rotate(0deg); }
  }

  .main-title {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    line-height: 1.1;
    color: var(--yellow);
    text-shadow: 0 0 30px rgba(255,214,0,0.4);
    letter-spacing: -0.02em;
  }
  .main-sub { font-size: 1.1rem; color: var(--gray); font-weight: 400; }

  .edition-tabs {
    display: flex; gap: 12px; margin: .5rem 0;
  }
  .edition-tab {
    padding: .7rem 2rem; border-radius: 50px; font-size: 1rem; font-weight: 700;
    cursor: pointer; border: 2.5px solid transparent; transition: all .2s;
    font-family: var(--font);
  }
  .edition-tab.basic {
    background: var(--yellow); color: #1A0A3B; border-color: var(--yellow-dark);
  }
  .edition-tab.basic:hover { background: var(--yellow-dark); }
  .edition-tab.adv {
    background: var(--pink); color: white; border-color: #E03080;
  }
  .edition-tab.adv:hover { background: #E03080; }

  .chapter-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
    width: 100%;
  }
  .chapter-btn {
    background: var(--card); border: 2px solid var(--card2);
    border-radius: 16px; padding: .9rem .4rem; text-align: center;
    cursor: pointer; transition: all .2s; font-family: var(--font);
  }
  .chapter-btn:hover { background: var(--card2); border-color: var(--purple-light); transform: translateY(-3px); }
  .chapter-btn .ch-num { font-size: .75rem; color: var(--purple-light); font-weight: 700; letter-spacing: .1em; }
  .chapter-btn .ch-name { font-size: .9rem; font-weight: 700; color: var(--white); margin-top: 4px; }

  .start-all-btn {
    padding: 1rem 3rem; background: var(--yellow); color: #1A0A3B;
    border: none; border-radius: 50px; font-size: 1.2rem; font-weight: 900;
    cursor: pointer; font-family: var(--font);
    transition: all .15s; box-shadow: 0 4px 20px rgba(255,214,0,0.4);
  }
  .start-all-btn:hover { background: var(--yellow-dark); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,214,0,0.5); }

  /* ══════════ 문제 화면 ══════════ */
  #screen-quiz { gap: .9rem; }

  .quiz-topbar {
    display: flex; align-items: center; gap: 12px;
    width: 100%;
  }
  .quiz-chapter-badge {
    background: var(--yellow); color: #1A0A3B;
    padding: .3rem 1rem; border-radius: 50px;
    font-size: .85rem; font-weight: 900;
  }
  .quiz-progress-wrap { flex: 1; background: rgba(255,255,255,.12); border-radius: 50px; height: 10px; overflow: hidden; }
  .quiz-progress-bar { height: 100%; background: var(--yellow); border-radius: 50px; transition: width .5s ease; }
  .quiz-counter { font-size: .9rem; color: var(--gray); white-space: nowrap; font-weight: 500; }
  .quiz-score-badge {
    background: var(--green); color: white;
    padding: .3rem .9rem; border-radius: 50px;
    font-size: .85rem; font-weight: 700;
  }

  .quiz-card {
    background: var(--card); border: 2px solid var(--card2);
    border-radius: 24px; padding: 1.8rem 2rem; width: 100%;
    position: relative; overflow: hidden;
  }
  .quiz-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: var(--yellow);
    transition: background .3s;
  }
  .quiz-card.type-adv::before { background: var(--pink); }
  .quiz-card.type-short::before { background: var(--teal); }

  .type-tag {
    display: inline-block; padding: .25rem .8rem;
    border-radius: 50px; font-size: .78rem; font-weight: 700;
    margin-bottom: .7rem;
  }
  .tag-mcq { background: rgba(124,58,237,.3); color: var(--purple-light); border: 1.5px solid var(--purple-light); }
  .tag-short { background: rgba(14,165,233,.25); color: #7DD3FC; border: 1.5px solid #7DD3FC; }
  .tag-err { background: rgba(255,95,160,.2); color: #FCA5C5; border: 1.5px solid #FCA5C5; }
  .tag-trans { background: rgba(34,197,94,.2); color: #86EFAC; border: 1.5px solid #86EFAC; }

  .q-number {
    font-size: .9rem; color: var(--gray); font-weight: 500; margin-bottom: .4rem;
  }
  .q-text {
    font-size: clamp(1.1rem, 2.5vw, 1.35rem);
    font-weight: 700; line-height: 1.5; margin-bottom: 1rem;
    color: var(--white);
  }
  .q-sub {
    background: rgba(255,255,255,.07); border-left: 3px solid var(--teal);
    padding: .7rem 1rem; border-radius: 0 10px 10px 0;
    font-size: 1rem; color: #A5F3FC; font-style: italic;
    margin-bottom: 1rem; line-height: 1.6;
  }

  /* 객관식 선택지 */
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice-btn {
    background: var(--bg2); border: 2px solid var(--card2);
    border-radius: 14px; padding: .85rem 1rem;
    font-size: .95rem; font-weight: 500; color: var(--white);
    cursor: pointer; text-align: left; transition: all .15s;
    font-family: var(--font); line-height: 1.4;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .choice-btn:hover:not(:disabled) { background: var(--card); border-color: var(--purple-light); transform: translateY(-1px); }
  .choice-btn .choice-num { font-size: 1.1rem; font-weight: 700; flex-shrink: 0; color: var(--purple-light); }
  .choice-btn.correct { background: rgba(34,197,94,.2); border-color: var(--green); }
  .choice-btn.correct .choice-num { color: var(--green); }
  .choice-btn.wrong { background: rgba(239,68,68,.2); border-color: var(--red); }
  .choice-btn.wrong .choice-num { color: var(--red); }
  .choice-btn:disabled { cursor: default; transform: none; }

  /* 어법 오류 문장 */
  .err-sentence {
    background: rgba(255,255,255,.07); border-radius: 14px;
    padding: 1.1rem 1.3rem; margin-bottom: 1rem;
    font-size: 1.05rem; line-height: 1.8; color: var(--white);
  }
  .ul-part { color: #FDE68A; font-weight: 700; text-decoration: underline; text-underline-offset: 3px; cursor: default; }
  .err-choices { display: flex; gap: 10px; flex-wrap: wrap; margin-top: .3rem; }
  .err-choice-btn {
    background: var(--bg2); border: 2px solid var(--card2);
    border-radius: 12px; padding: .65rem 1.1rem;
    font-size: 1rem; font-weight: 700; color: var(--white);
    cursor: pointer; transition: all .15s; font-family: var(--font);
    min-width: 56px; text-align: center;
  }
  .err-choice-btn:hover:not(:disabled) { background: var(--card); border-color: var(--pink); }
  .err-choice-btn.correct { background: rgba(34,197,94,.2); border-color: var(--green); color: var(--green); }
  .err-choice-btn.wrong { background: rgba(239,68,68,.2); border-color: var(--red); color: var(--red); }
  .err-choice-btn:disabled { cursor: default; }

  /* 영작/주관식 입력 */
  .trans-kor {
    background: rgba(14,165,233,.12); border: 1.5px solid rgba(14,165,233,.35);
    border-radius: 14px; padding: 1rem 1.2rem;
    font-size: 1.15rem; font-weight: 700; color: var(--white);
    margin-bottom: .6rem;
  }
  .trans-hint { font-size: .85rem; color: #7DD3FC; margin-bottom: .8rem; font-style: italic; }

  .short-input-wrap { display: flex; gap: 10px; width: 100%; }
  .short-input {
    flex: 1; background: var(--bg2); border: 2px solid var(--card2);
    border-radius: 14px; padding: .85rem 1.1rem;
    font-size: 1rem; color: var(--white); font-family: var(--font);
    outline: none; transition: border-color .15s;
  }
  .short-input:focus { border-color: var(--teal); }
  .short-input.correct { border-color: var(--green); background: rgba(34,197,94,.1); }
  .short-input.wrong { border-color: var(--red); background: rgba(239,68,68,.1); }
  .submit-btn {
    background: var(--teal); color: white; border: none;
    border-radius: 14px; padding: .85rem 1.3rem;
    font-size: .95rem; font-weight: 700; cursor: pointer;
    font-family: var(--font); transition: all .15s; white-space: nowrap;
  }
  .submit-btn:hover { filter: brightness(1.1); }

  /* 피드백 */
  .feedback-box {
    border-radius: 14px; padding: 1rem 1.2rem; margin-top: .8rem;
    display: none; animation: fadeIn .3s ease;
  }
  .feedback-box.show { display: block; }
  .feedback-box.correct-fb { background: rgba(34,197,94,.15); border: 1.5px solid rgba(34,197,94,.4); }
  .feedback-box.wrong-fb { background: rgba(239,68,68,.1); border: 1.5px solid rgba(239,68,68,.3); }
  .fb-result { font-size: 1rem; font-weight: 700; margin-bottom: .3rem; }
  .fb-correct { color: var(--green); }
  .fb-wrong { color: var(--red); }
  .fb-answer { font-size: .95rem; color: #FDE68A; font-weight: 500; margin-bottom: .25rem; }
  .fb-exp { font-size: .9rem; color: var(--gray); line-height: 1.5; }

  /* 다음 버튼 */
  .next-btn {
    background: var(--yellow); color: #1A0A3B; border: none;
    border-radius: 50px; padding: .85rem 2.5rem;
    font-size: 1rem; font-weight: 900; cursor: pointer;
    font-family: var(--font); transition: all .15s; align-self: flex-end;
    display: none;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { background: var(--yellow-dark); transform: translateY(-2px); }

  /* ══════════ 결과 화면 ══════════ */
  #screen-result { gap: 1.2rem; text-align: center; }
  .result-emoji { font-size: 72px; line-height: 1; animation: resultBounce .6s ease; }
  @keyframes resultBounce { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }
  .result-title { font-size: 2.2rem; font-weight: 900; color: var(--yellow); }
  .result-score-big { font-size: 3.5rem; font-weight: 900; color: var(--white); }
  .result-score-big span { font-size: 1.5rem; color: var(--gray); font-weight: 400; }
  .result-grid {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  }
  .result-dot {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: .8rem; font-weight: 700;
  }
  .result-dot.ok { background: rgba(34,197,94,.25); color: var(--green); border: 1.5px solid var(--green); }
  .result-dot.ng { background: rgba(239,68,68,.2); color: var(--red); border: 1.5px solid var(--red); }
  .result-grade { font-size: 1.3rem; font-weight: 700; color: var(--white); }
  .result-buttons { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .result-btn {
    padding: .85rem 2rem; border-radius: 50px; font-size: 1rem; font-weight: 700;
    cursor: pointer; border: none; font-family: var(--font); transition: all .15s;
  }
  .result-btn.primary { background: var(--yellow); color: #1A0A3B; }
  .result-btn.secondary { background: var(--card); color: var(--white); border: 1.5px solid var(--card2); }
  .result-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

  /* confetti */
  .confetti-piece {
    position: fixed; width: 10px; height: 10px; border-radius: 2px;
    pointer-events: none; z-index: 999;
    animation: confettiFall var(--cd, 2s) ease-in var(--cdelay, 0s) forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-40px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* 챕터 완료 중간 화면 */
  .chapter-clear {
    text-align: center; padding: 1rem;
  }
  .chapter-clear-emoji { font-size: 56px; line-height: 1; animation: resultBounce .5s ease; }
  .chapter-clear-title { font-size: 1.6rem; font-weight: 900; color: var(--yellow); margin: .5rem 0 .3rem; }
  .chapter-clear-score { font-size: 1rem; color: var(--gray); }

  /* 반응형 */
  @media (max-width: 600px) {
    .choices { grid-template-columns: 1fr; }
    .chapter-grid { grid-template-columns: repeat(3, 1fr); }
    .main-title { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<!-- 배경 별 -->
<div class="stars" id="stars"></div>

<!-- 떠다니는 이모지 장식 -->
<div class="floater" style="top:8%;left:3%;--fs:32px;--fd:7s;--fdelay:0s">📣</div>
<div class="floater" style="top:15%;right:4%;--fs:28px;--fd:5s;--fdelay:1s">⭐</div>
<div class="floater" style="bottom:12%;left:5%;--fs:30px;--fd:8s;--fdelay:2s">🔔</div>
<div class="floater" style="top:40%;right:2%;--fs:26px;--fd:6s;--fdelay:.5s">✨</div>
<div class="floater" style="bottom:20%;right:6%;--fs:32px;--fd:9s;--fdelay:1.5s">🌟</div>
<div class="floater" style="top:70%;left:2%;--fs:24px;--fd:5.5s;--fdelay:3s">🎉</div>
<div class="floater" style="top:25%;left:8%;--fs:22px;--fd:7s;--fdelay:2.5s">💫</div>

<div id="app">

  <!-- ▶ 타이틀 화면 -->
  <div id="screen-title" class="screen active">
    <div class="bell-icon">📣</div>
    <div class="main-title">Grammar Smart 2<br>골든벨</div>
    <div class="main-sub">Ch.01~05 · 총 100문제 (기본판 50 + 심화판 50)</div>
    <div class="edition-tabs">
      <button class="edition-tab basic" onclick="selectEdition('basic')">📗 기본판</button>
      <button class="edition-tab adv" onclick="selectEdition('adv')">🔥 심화판</button>
    </div>
    <div class="chapter-grid" id="chapter-grid"></div>
    <button class="start-all-btn" onclick="startAll()">🎯 전체 시작 (10문제씩)</button>
  </div>

  <!-- ▶ 문제 화면 -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-topbar">
      <div class="quiz-chapter-badge" id="quiz-chapter-badge">Ch.01</div>
      <div class="quiz-progress-wrap"><div class="quiz-progress-bar" id="quiz-progress-bar" style="width:0%"></div></div>
      <div class="quiz-counter" id="quiz-counter">1 / 10</div>
      <div class="quiz-score-badge" id="quiz-score-badge">0점</div>
    </div>

    <div class="quiz-card" id="quiz-card">
      <!-- 동적 렌더 -->
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">다음 문제 →</button>
  </div>

  <!-- ▶ 결과 화면 -->
  <div id="screen-result" class="screen">
    <div class="result-emoji" id="result-emoji">🏆</div>
    <div class="result-title" id="result-title">결과</div>
    <div class="result-score-big" id="result-score-big">0<span> / 10</span></div>
    <div class="result-grid" id="result-grid"></div>
    <div class="result-grade" id="result-grade"></div>
    <div class="result-buttons">
      <button class="result-btn primary" onclick="nextChapter()">다음 챕터 →</button>
      <button class="result-btn secondary" onclick="goTitle()">처음으로</button>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════
//  별 생성
// ══════════════════════════════════════════════════════
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.className='star';
    const size=Math.random()*3+1.5;
    s.style.cssText=`width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s;`;
    if(Math.random()>.7) s.style.background=Math.random()>.5?'#fff':'#A78BFA';
    c.appendChild(s);
  }
})();

// ══════════════════════════════════════════════════════
//  문제 데이터
// ══════════════════════════════════════════════════════
const CHAPTERS=[
  {no:1,title:"문장의 형식",sub:"Sentence Patterns"},
  {no:2,title:"조동사",sub:"Auxiliary Verbs"},
  {no:3,title:"비교",sub:"Comparisons"},
  {no:4,title:"수동태",sub:"Passive Voice"},
  {no:5,title:"명사·관사",sub:"Nouns & Articles"},
];

const BASIC={
1:[
  {t:"mcq",q:"다음 중 문장의 형식이 나머지와 다른 것은?",ch:["She became a doctor.","He looks tired.","The sun rises in the east.","It smells delicious."],a:2,ae:"1형식(S+V). 나머지는 2형식(S+V+주격보어)."},
  {t:"mcq",q:"빈칸에 알맞은 것은?\nShe _____ a nurse at the local hospital.",ch:["is","looks","goes","arrives"],a:0,ae:"be동사 2형식. is + 명사 보어."},
  {t:"mcq",q:"다음 중 올바른 문장은?",ch:["He arrived at Seoul by bus.","She reached to the top.","They discussed about the issue.","He entered into the room."],a:0,ae:"reach/discuss/enter는 전치사 없이 바로 목적어를 취하는 타동사."},
  {t:"mcq",q:"4형식→3형식 전환 시 빈칸에 알맞은 전치사는?\nShe bought me a gift. → She bought a gift ___ me.",ch:["to","for","of","from"],a:1,ae:"buy는 for를 쓰는 동사. give/send/tell → to, make/buy/cook → for."},
  {t:"mcq",q:"목적격 보어(O.C)에 해당하는 것은?\nThey elected him president.",ch:["They","elected","him","president"],a:3,ae:"5형식: S+V+O+O.C. president가 him을 보충 설명."},
  {t:"mcq",q:"빈칸에 알맞은 것은?\nI heard someone _____ in the next room.",ch:["cried","to cry","crying","cry to"],a:2,ae:"지각동사(hear)+목적어+현재분사(진행 강조). 원형부정사도 가능."},
  {t:"mcq",q:"다음 중 2형식 동사가 아닌 것은?",ch:["become","smell","remain","discuss"],a:3,ae:"discuss는 완전타동사(3형식). become/smell/remain은 불완전자동사(2형식)."},

    {kor:"그 편지는 어제 그녀에 의해 쓰였다.",hint:"(write, yesterday)",a:"The letter was written by her yesterday.",ae:"과거 수동태: was/were+p.p.+by+행위자."},

},
5:{
  err:[

    {s:[{t:"There were ",u:0},{t:"①a number of",u:1},{t:" ",u:0},{t:"②furnitures",u:1},{t:" in the room, including ",u:0},{t:"③a large sofa",u:1},{t:" and ",u:0},{t:"④two wooden chairs",u:1},{t:".",u:0}],a:"②",ae:"furniture는 불가산명사 → 복수형 없음. furnitures → furniture."},

    {kor:"그 건물에 약 5천 명의 사람들이 살고 있다.",hint:"(thousands, live in)",a:"Thousands of people live in the building.",ae:"thousands of = 수천의. 막연한 수 → 복수형."},
    {kor:"나일강은 세계에서 가장 긴 강 중 하나이다.",hint:"(the Nile, one of the longest)",a:"The Nile is one of the longest rivers in the world.",ae:"강 이름 앞 the. one of the+최상급+복수명사."},
    {kor:"그는 매우 정직한 사람이다.",hint:"(honest, man)",a:"He is a very honest man.",ae:"honest는 /ɒ/ 모음 발음. 'a very honest' 자연스럽다."},
    {kor:"그 박물관에는 전시할 공간이 거의 없다.",hint:"(little room, display)",a:"The museum has little room[space] to display.",ae:"room이 '공간' 의미일 때 불가산명사 → little room."},
  ],
},
};

// ══════════════════════════════════════════════════════
//  게임 상태
// ══════════════════════════════════════════════════════
let edition='basic';
let queue=[]; // [{chNo, qIdx}]
let queuePos=0;
let chapterResults={}; // {chNo: [true/false, ...]}
let currentAnswered=false;
let currentCorrect=false;

// ══════════════════════════════════════════════════════
//  초기화
// ══════════════════════════════════════════════════════
function init(){
  const grid=document.getElementById('chapter-grid');
  grid.innerHTML='';
  CHAPTERS.forEach(ch=>{
    const btn=document.createElement('div');
    btn.className='chapter-btn';
    btn.innerHTML=`<div class="ch-num">CH.0${ch.no}</div><div class="ch-name">${ch.title}</div>`;
    btn.onclick=()=>startChapter(ch.no);
    grid.appendChild(btn);
  });
}

function selectEdition(ed){
  edition=ed;
  document.querySelectorAll('.edition-tab').forEach(t=>t.style.opacity='.5');
  document.querySelector(`.edition-tab.${ed}`).style.opacity='1';
}
selectEdition('basic');

function startAll(){
  queue=[];
  CHAPTERS.forEach(ch=>{
    for(let i=0;i<10;i++) queue.push({chNo:ch.no,qIdx:i});
  });
  queuePos=0;
  chapterResults={};
  CHAPTERS.forEach(ch=>{chapterResults[ch.no]=[];});
  showQuiz();
}

function startChapter(chNo){
  queue=[];
  for(let i=0;i<10;i++) queue.push({chNo,qIdx:i});
  queuePos=0;
  chapterResults={};
  chapterResults[chNo]=[];
  showQuiz();
}

// ══════════════════════════════════════════════════════
//  화면 전환
// ══════════════════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goTitle(){ showScreen('screen-title'); }

// ══════════════════════════════════════════════════════
//  문제 렌더
// ══════════════════════════════════════════════════════
function getQ(chNo,qIdx){
  if(edition==='basic') return BASIC[chNo][qIdx];
  const data=ADV[chNo];
  if(qIdx<5) return {type:'err',...data.err[qIdx]};
  return {type:'trans',...data.trans[qIdx-5]};
}

function showQuiz(){
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion(){
  currentAnswered=false;
  const {chNo,qIdx}=queue[queuePos];
  const q=getQ(chNo,qIdx);
  const total=queue.length;
  const progress=Math.round((queuePos/total)*100);

  document.getElementById('quiz-chapter-badge').textContent=`Ch.0${chNo} · ${CHAPTERS[chNo-1].title}`;
  document.getElementById('quiz-progress-bar').style.width=progress+'%';
  document.getElementById('quiz-counter').textContent=`${queuePos+1} / ${total}`;
  const totalCorrect=Object.values(chapterResults).flat().filter(Boolean).length;
  document.getElementById('quiz-score-badge').textContent=`${totalCorrect}점`;

  const card=document.getElementById('quiz-card');
  document.getElementById('next-btn').className='next-btn';

  if(edition==='basic'){
    card.className='quiz-card';
    renderBasicQ(card,q,chNo,qIdx);
  } else {
    card.className='quiz-card type-adv';
    if(qIdx<5) renderErrQ(card,q,chNo,qIdx);
    else renderTransQ(card,q,chNo,qIdx);
  }
}

function renderBasicQ(card,q,chNo,qIdx){
  const lines=q.q.split('\n');
  const isShort=q.t==='short';
  const tag=isShort?'<span class="type-tag tag-short">주관식</span>':'<span class="type-tag tag-mcq">객관식</span>';

  let html=`${tag}<div class="q-number">Q${qIdx+1}</div>`;
  html+=`<div class="q-text">${escHtml(lines[0])}</div>`;
  if(lines[1]) html+=`<div class="q-sub">${escHtml(lines[1])}</div>`;

  if(!isShort){
    html+='<div class="choices">';
    q.ch.forEach((c,i)=>{
      html+=`<button class="choice-btn" onclick="answerMCQ(${i})">
        <span class="choice-num">${['①','②','③','④'][i]}</span>
        <span>${escHtml(c)}</span>
      </button>`;
    });
    html+='</div>';
  } else {
    html+=`<div class="short-input-wrap">
      <input class="short-input" id="short-inp" placeholder="정답을 입력하세요..." onkeydown="if(event.key==='Enter')checkShort()">
      <button class="submit-btn" onclick="checkShort()">확인</button>
    </div>`;
  }
  html+='<div class="feedback-box" id="feedback-box"></div>';
  card.innerHTML=html;
  if(isShort) setTimeout(()=>{ const el=document.getElementById('short-inp'); if(el)el.focus(); },50);
}

function renderErrQ(card,q,chNo,qIdx){
  let html=`<span class="type-tag tag-err">어법 오류 찾기</span>`;
  html+=`<div class="q-number">Q${qIdx+1}</div>`;
  html+=`<div class="q-text">다음 밑줄 친 부분 중 어법상 틀린 것을 고르시오.</div>`;
  html+='<div class="err-sentence">';
  q.s.forEach(seg=>{
    html+=seg.u
      ?`<span class="ul-part">${escHtml(seg.t)}</span>`
      :escHtml(seg.t);
  });
  html+='</div>';
  html+='<div class="err-choices">';
  ['①','②','③','④','⑤ 없음'].forEach(opt=>{
    html+=`<button class="err-choice-btn" onclick="answerErr('${opt.replace(/[^①②③④⑤]/g,'').trim()||'⑤'}')">${escHtml(opt)}</button>`;
  });
  html+='</div>';
  html+='<div class="feedback-box" id="feedback-box"></div>';
  card.innerHTML=html;
}

function renderTransQ(card,q,chNo,qIdx){
  let html=`<span class="type-tag tag-trans">문장 전체 영작</span>`;
  html+=`<div class="q-number">Q${qIdx+1}</div>`;
  html+=`<div class="q-text">다음 우리말을 영어로 옮기시오.</div>`;
  html+=`<div class="trans-kor">${escHtml(q.kor)}</div>`;
  html+=`<div class="trans-hint">힌트: ${escHtml(q.hint)}</div>`;
  html+=`<div class="short-input-wrap">
    <input class="short-input" id="short-inp" placeholder="영어로 써보세요..." onkeydown="if(event.key==='Enter')checkTrans()">
    <button class="submit-btn" onclick="checkTrans()">확인</button>
  </div>`;
  html+='<div class="feedback-box" id="feedback-box"></div>';
  card.innerHTML=html;
  setTimeout(()=>{ const el=document.getElementById('short-inp'); if(el)el.focus(); },50);
}

// ══════════════════════════════════════════════════════
//  정답 처리
// ══════════════════════════════════════════════════════
function answerMCQ(i){
  if(currentAnswered)return;
  currentAnswered=true;
  const {chNo,qIdx}=queue[queuePos];
  const q=BASIC[chNo][qIdx];
  const correct=i===q.a;
  currentCorrect=correct;
  recordResult(chNo,correct);

  document.querySelectorAll('.choice-btn').forEach((btn,idx)=>{
    btn.disabled=true;
    if(idx===q.a) btn.classList.add('correct');
    else if(idx===i&&!correct) btn.classList.add('wrong');
  });
  showFeedback(correct,q.a!==undefined?`정답: ${['①','②','③','④'][q.a]}  ${q.ch[q.a]}`:'',q.ae);
}

function answerErr(chosen){
  if(currentAnswered)return;
  currentAnswered=true;
  const {chNo,qIdx}=queue[queuePos];
  const q=ADV[chNo].err[qIdx];
  const correct=chosen===q.a;
  currentCorrect=correct;
  recordResult(chNo,correct);

  document.querySelectorAll('.err-choice-btn').forEach(btn=>{
    btn.disabled=true;
    const txt=btn.textContent.replace(/[^①②③④⑤]/g,'').trim()||'⑤';
    if(txt===q.a) btn.classList.add('correct');
    else if(txt===chosen&&!correct) btn.classList.add('wrong');
  });
  showFeedback(correct,`정답: ${q.a}`,q.ae);
}

function checkShort(){
  if(currentAnswered)return;
  const inp=document.getElementById('short-inp');
  if(!inp)return;
  const val=inp.value.trim();
  if(!val)return;
  currentAnswered=true;
  const {chNo,qIdx}=queue[queuePos];
  const q=BASIC[chNo][qIdx];
  const correct=normalizeAns(val)===normalizeAns(q.a);
  currentCorrect=correct;
  recordResult(chNo,correct);
  inp.disabled=true;
  inp.classList.add(correct?'correct':'wrong');
  document.querySelector('.submit-btn').disabled=true;
  showFeedback(correct,`정답: ${q.a}`,q.ae);
}

function checkTrans(){
  if(currentAnswered)return;
  const inp=document.getElementById('short-inp');
  if(!inp)return;
  const val=inp.value.trim();
  if(!val)return;
  currentAnswered=true;
  const {chNo,qIdx}=queue[queuePos];
  const q=ADV[chNo].trans[qIdx-5];
  currentCorrect=false; // 영작은 항상 모범답안 보여주기
  recordResult(chNo,true); // 영작은 시도하면 기록
  inp.disabled=true;
  document.querySelector('.submit-btn').disabled=true;
  showFeedback(null,`모범 답안: ${q.a}`,q.ae, true);
}

function normalizeAns(s){ return String(s).trim().toLowerCase().replace(/[^\w가-힣]/g,''); }

function showFeedback(correct,ansText,exp,isRef=false){
  const box=document.getElementById('feedback-box');
  if(!box)return;
  let cls='feedback-box show ';
  let icon='';
  if(isRef){ cls+='correct-fb'; icon='<span class="fb-result" style="color:#7DD3FC">📝 모범 답안 확인</span>'; }
  else if(correct){ cls+='correct-fb'; icon='<span class="fb-result fb-correct">✓ 정답!</span>'; }
  else { cls+='wrong-fb'; icon='<span class="fb-result fb-wrong">✗ 오답</span>'; }

  box.className=cls;
  box.innerHTML=`${icon}${ansText?`<div class="fb-answer">${escHtml(ansText)}</div>`:''}${exp?`<div class="fb-exp">${escHtml(exp)}</div>`:''}`;
  document.getElementById('next-btn').className='next-btn show';
}

function recordResult(chNo,correct){
  if(!chapterResults[chNo]) chapterResults[chNo]=[];
  chapterResults[chNo].push(correct);
}

// ══════════════════════════════════════════════════════
//  다음 문제 / 챕터 결과
// ══════════════════════════════════════════════════════
function nextQuestion(){
  queuePos++;
  if(queuePos>=queue.length){ showFinalResult(); return; }

  const prevChNo=queue[queuePos-1].chNo;
  const currChNo=queue[queuePos].chNo;
  // 챕터가 바뀌었고 이전 챕터가 완전히 끝났으면 중간 결과
  if(prevChNo!==currChNo && chapterResults[prevChNo]&&chapterResults[prevChNo].length===10){
    showChapterResult(prevChNo,()=>{ showQuiz(); });
  } else {
    renderQuestion();
  }
}

function showChapterResult(chNo,cb){
  const results=chapterResults[chNo]||[];
  const correct=results.filter(Boolean).length;
  const ch=CHAPTERS[chNo-1];
  const card=document.getElementById('quiz-card');
  document.getElementById('next-btn').className='next-btn';

  let grade='';
  if(correct===10) grade='🏆 완벽해요!';
  else if(correct>=8) grade='🥇 훌륭해요!';
  else if(correct>=6) grade='🥈 잘했어요!';
  else grade='🥉 더 노력해봐요!';

  let dots=results.map((r,i)=>`<div class="result-dot ${r?'ok':'ng'}">${i+1}</div>`).join('');

  card.innerHTML=`<div class="chapter-clear">
    <div class="chapter-clear-emoji">${correct>=8?'🎉':'📚'}</div>
    <div class="chapter-clear-title">Ch.0${chNo} ${ch.title} 완료!</div>
    <div class="chapter-clear-score">${correct}/10 정답 · ${grade}</div>
    <div class="result-grid" style="justify-content:center;margin-top:1rem">${dots}</div>
  </div>`;

  document.getElementById('next-btn').className='next-btn show';
  document.getElementById('next-btn').onclick=()=>{
    document.getElementById('next-btn').onclick=nextQuestion;
    cb();
  };

  if(correct>=8) launchConfetti();
}

// ══════════════════════════════════════════════════════
//  최종 결과
// ══════════════════════════════════════════════════════
function showFinalResult(){
  const allResults=Object.values(chapterResults).flat();
  const correct=allResults.filter(Boolean).length;
  const total=allResults.length;
  const pct=Math.round(correct/total*100);

  let emoji='🏆',grade='';
  if(pct===100){ emoji='🏆'; grade='완벽한 골든벨! 🎊'; }
  else if(pct>=80){ emoji='🥇'; grade='훌륭해요! 거의 다 맞았어요!'; }
  else if(pct>=60){ emoji='🥈'; grade='잘했어요! 한 번 더 도전해봐요!'; }
  else { emoji='📚'; grade='복습이 필요해요. 다시 도전!'; }

  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-title').textContent=`${edition==='basic'?'기본판':'심화판'} 결과`;
  document.getElementById('result-score-big').innerHTML=`${correct}<span> / ${total}</span>`;
  document.getElementById('result-grade').textContent=grade;

  let dots=allResults.map((r,i)=>`<div class="result-dot ${r?'ok':'ng'}">${i+1}</div>`).join('');
  document.getElementById('result-grid').innerHTML=dots;

  document.getElementById('next-btn').className='next-btn';
  showScreen('screen-result');
  if(pct>=60) launchConfetti();
}

function nextChapter(){
  // 다른 챕터로 타이틀로
  goTitle();
}

// ══════════════════════════════════════════════════════
//  콘페티
// ══════════════════════════════════════════════════════
function launchConfetti(){
  const colors=['#FFD600','#FF5FA0','#A78BFA','#22C55E','#0EA5E9','#FF7A00'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};--cd:${1.5+Math.random()*2}s;--cdelay:${Math.random()*.8}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(2.5+Math.random())*1000);
  }
}

// 유틸
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// 초기화
init();
</script>
</body>
</html>
